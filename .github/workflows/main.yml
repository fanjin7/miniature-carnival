name: Academic Research Daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  academic-research-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check configuration
        env:
          OPENAI_BASE_URL: https://api.deepseek.com
          OPENAI_MODEL: deepseek-v4-flash
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_SERVER: smtp.163.com
          MAIL_FROM_NAME: Academic Research Daily
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          DAILY_DIR: docs
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "36"
          PUBLICATION_YEARS: "3"
          PRIMARY_SEARCH_DAYS: "1095"
          FALLBACK_SEARCH_YEARS: "3"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py check-config

      - name: Run Academic Research Daily
        env:
          OPENAI_BASE_URL: https://api.deepseek.com
          OPENAI_MODEL: deepseek-v4-flash
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_SERVER: smtp.163.com
          MAIL_FROM_NAME: Academic Research Daily
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          DAILY_DIR: docs
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "36"
          PUBLICATION_YEARS: "3"
          PRIMARY_SEARCH_DAYS: "1095"
          FALLBACK_SEARCH_YEARS: "3"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py run-once

      - name: Persist reports and seen state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.md docs/*.docx data/seen_papers.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No report or seen-state changes to commit."
            exit 0
          fi
          git commit -m "Update academic research daily report"
          git push origin HEAD:main

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academic-research-daily-output
          if-no-files-found: ignore
          path: |
            docs/*.md
            docs/*.docx
            logs/
            data/seen_papers.json
